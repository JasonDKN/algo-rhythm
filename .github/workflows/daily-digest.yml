name: Daily Content Digest

on:
  schedule:
    - cron: '0 13 * * *'   # ~7am MST / 6am MDT (Calgary). Adjust to taste.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (espeak-ng for pronunciation fallback)
        run: sudo apt-get update -qq && sudo apt-get install -y espeak-ng ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python digest.py

      - name: Commit updated data & dashboard
        run: |
          git config user.name "content-digest-bot"
          git config user.email "actions@github.com"
          git add data/seen_items.json data/taste_profile.json data/phrase_ipa.json docs/index.html docs/audio
          git diff --quiet --cached || git commit -m "Update daily digest [skip ci]"
          git push
