name: Weekly Check-In

on:
  schedule:
    - cron: '0 15 * * 0'   # Sundays, ~9am MDT (Calgary). Adjust to taste.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly check-in
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python weekly_checkin.py

      - name: Commit updated weekly focus & check-in page
        run: |
          git config user.name "content-digest-bot"
          git config user.email "actions@github.com"
          git add data/weekly_focus.json docs/checkin.html
          git diff --quiet --cached || git commit -m "Weekly check-in [skip ci]"
          git push
