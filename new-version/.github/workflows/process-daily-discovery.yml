name: Process Daily Discovery Reply

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'daily-discovery')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process reply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python daily_discovery_processor.py

      - name: Commit updated discovered topics & taste profile
        run: |
          git config user.name "content-digest-bot"
          git config user.email "actions@github.com"
          git add data/discovered_topics.json data/taste_profile.json
          git diff --quiet --cached || git commit -m "Update discovered topics from daily reply [skip ci]"
          git push
